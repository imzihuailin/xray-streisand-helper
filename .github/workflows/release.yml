name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test -race ./...
      - run: go vet ./...
      - name: Build
        env:
          VERSION: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
        run: |
          set -euo pipefail
          mkdir dist
          for arch in amd64 arm64; do
            CGO_ENABLED=0 GOOS=linux GOARCH="$arch" go build -trimpath \
              -ldflags "-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.buildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              -o dist/xray-streisand-helper ./cmd/xray-streisand-helper
            tar -C dist -czf "dist/xray-streisand-helper_linux_${arch}.tar.gz" xray-streisand-helper
            rm dist/xray-streisand-helper
          done
          cd dist
          sha256sum ./*.tar.gz > checksums.txt
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
